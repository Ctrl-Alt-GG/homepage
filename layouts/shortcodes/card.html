{{ $icon := .Get "icon" }}
{{ $title := .Get "title" }}
<div class="cag-card rounded-card px-[1.6rem] py-6 border border-[var(--cag-border-color)] bg-[var(--cag-body-bg)] relative overflow-hidden">
  <span class="cag-card-icon text-[2.1rem] leading-none block mb-[0.85rem] text-center">{{ $icon }}</span>
  <div class="cag-card-title text-[1.05rem] font-bold mb-[0.45rem] text-brand-500 text-center">{{ $title | htmlUnescape }}</div>
  <p class="cag-card-desc text-sm leading-[1.65] m-0 opacity-75">{{ .Inner }}</p>
</div>
